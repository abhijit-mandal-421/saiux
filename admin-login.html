<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SAIUX Admin Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 120px;
    }
    input {
      display: block;
      margin: 12px auto;
      padding: 10px;
      width: 260px;
      font-size: 14px;
    }
    button {
      padding: 10px 25px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover {
      background: #0056b3;
    }
    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>SAIUX Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email" />
<input type="password" id="password" placeholder="Password" />
<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
  // API URL - automatically switches between local and production
  const API_URL = window.location.hostname === 'localhost' 
    ? 'http://localhost:5000' 
    : 'https://YOUR-BACKEND-NAME.onrender.com';  // Replace after deployment

  async function login() {
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const msg = document.getElementById("msg");

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      msg.innerText = "⚠️ Please enter email and password";
      msg.style.color = "red";
      return;
    }

    try {
      const res = await fetch(`${API_URL}/api/admin/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        // Save JWT token
        localStorage.setItem("adminToken", data.token);

        msg.innerText = "✅ Login successful. Redirecting...";
        msg.style.color = "green";

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 800);

      } else {
        msg.innerText = "❌ " + (data.message || "Invalid credentials");
        msg.style.color = "red";
      }

    } catch (err) {
      console.error(err);
      msg.innerText = "❌ Cannot connect to backend";
      msg.style.color = "red";
    }
  }
</script>

</body>
</html>
